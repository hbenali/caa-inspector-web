<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c4a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a7bd5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d9eff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded rectangle background -->
  <rect width="100" height="100" rx="20" fill="url(#bgGradient)"/>
  
  <!-- CAA Text -->
  <text x="50" y="70" font-size="48" text-anchor="middle" fill="white" 
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-weight="600" letter-spacing="-1">CAA</text>
  
  <!-- Decorative dots representing DNS records -->
  <circle cx="75" cy="30" r="8" fill="url(#dotGradient)" opacity="0.9"/>
  <circle cx="25" cy="30" r="8" fill="url(#dotGradient)" opacity="0.9"/>
  
  <!-- Small accent dots -->
  <circle cx="65" cy="20" r="3" fill="white" opacity="0.6"/>
  <circle cx="35" cy="20" r="3" fill="white" opacity="0.6"/>
</svg>